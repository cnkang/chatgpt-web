name: build_docker

on:
  push:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'chatgpt-web' }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  # 并行构建不同架构，使用QEMU模拟
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-${{ github.run_id }}-${{ matrix.arch }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.ref_name }}

      - run: |
          echo "构建架构：${{ matrix.arch }}"
          echo "构建平台：${{ matrix.platform }}"
          echo "ECR Registry: ${{ steps.login-ecr.outputs.registry }}"
          echo "ECR Repository: ${{ env.ECR_REPOSITORY }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push ${{ matrix.arch }}
        id: docker_build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # 为每个架构使用独立的缓存
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
          # 推送时使用digest模式，便于后续合并
          outputs: type=image,name=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.docker_build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
          echo "Built ${{ matrix.arch }} with digest: $digest"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # 创建多架构manifest
  create-manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-${{ github.run_id }}-manifest
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract metadata for manifest
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.ref_name }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # 获取所有digest文件
          digests=$(printf '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}@sha256:%s ' *)

          # 为每个tag创建多架构manifest
          tags="${{ steps.meta.outputs.tags }}"
          while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then
              echo "Creating multi-arch manifest for: $tag"
              docker buildx imagetools create $digests --tag "$tag"
            fi
          done <<< "$tags"

      - name: Inspect final images
        run: |
          tags="${{ steps.meta.outputs.tags }}"
          while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then
              echo "=== Inspecting: $tag ==="
              docker buildx imagetools inspect "$tag"
              echo ""
            fi
          done <<< "$tags"

      - name: Build summary
        run: |
          echo "## 🚀 Multi-arch Docker Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ env.ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Built Architectures:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ linux/amd64 (QEMU parallel build)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ linux/arm64 (QEMU parallel build)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Performance Benefits:" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ Parallel architecture builds" >> $GITHUB_STEP_SUMMARY
          echo "- 💾 Architecture-specific caching" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 Digest-based multi-arch manifest" >> $GITHUB_STEP_SUMMARY
