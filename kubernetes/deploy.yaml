apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatgpt-web
  labels:
    app: chatgpt-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chatgpt-web
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: chatgpt-web
    spec:
      automountServiceAccountToken: false
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - image: your-registry/chatgpt-web:<git-sha>
          name: chatgpt-web
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          env:
            - name: AI_PROVIDER
              value: openai
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chatgpt-web-secrets
                  key: openai-api-key
            - name: OPENAI_API_BASE_URL
              value: 'https://api.openai.com'
            - name: SKIP_API_DOMAIN_CHECK
              value: 'false'
            - name: DEFAULT_MODEL
              value: gpt-5.4
            - name: OPENAI_API_MODEL
              value: gpt-5.4
            - name: AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chatgpt-web-secrets
                  key: auth-secret-key
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: chatgpt-web-secrets
                  key: session-secret
            - name: ALLOWED_ORIGINS
              value: 'https://your-app.example.com'
            - name: TIMEOUT_MS
              value: '60000'
            - name: SOCKS_PROXY_HOST
              value: ''
            - name: SOCKS_PROXY_PORT
              value: ''
            - name: HTTPS_PROXY
              value: ''
          resources:
            limits:
              cpu: 500m
              memory: 500Mi
            requests:
              cpu: 300m
              memory: 300Mi
              ephemeral-storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: chatgpt-web
  name: chatgpt-web
spec:
  ports:
    - name: chatgpt-web
      port: 3002
      protocol: TCP
      targetPort: 3002
  selector:
    app: chatgpt-web
  type: ClusterIP
---
# Create this Secret before deploying. Replace placeholder values with real credentials.
# Example:
#   kubectl create secret generic chatgpt-web-secrets \
#     --from-literal=openai-api-key='sk-xxx' \
#     --from-literal=auth-secret-key='your-auth-secret' \
#     --from-literal=session-secret='your-session-secret'
apiVersion: v1
kind: Secret
metadata:
  name: chatgpt-web-secrets
  labels:
    app: chatgpt-web
type: Opaque
stringData:
  openai-api-key: 'REPLACE_ME'
  auth-secret-key: 'REPLACE_ME'
  session-secret: 'REPLACE_ME'
